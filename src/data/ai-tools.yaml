  - name: Images
    tools:
      - name: Nano Banana
        url: https://nanobanana.com/
        description: AI image generation
        usage: |
          Used to craft iterations of the Turtleand avatar.
          Great for character design and stylized illustrations.
        related:
          - title: Evolution Archive
            url: https://turtleand.com/
        tags: [avatar-design]

      - name: ChatGPT Image
        url: https://chat.openai.com/
        description: OpenAI's image generation in ChatGPT
        usage: |
          Created several Turtleand avatar variations.
          Useful for quick concept iterations with conversational refinement.
        related:
          - title: Evolution Archive
            url: https://turtleand.com/
        tags: [avatar-design]

      - name: Recraft
        url: https://www.recraft.ai/
        description: AI image generation and design
        usage: |
          Used to create and refine the Turtleand portal logo.
          Great for vector-style graphics and brand assets.
